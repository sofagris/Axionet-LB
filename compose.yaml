services:
  api:
    build: ./backend
    container_name: ax-api
    restart: unless-stopped
    pid: host
    # Required so nsenter can enter host netns for NIC/VLAN management (caps alone are insufficient).
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    environment:
      DATABASE_URL: sqlite:////var/lib/ax-lb/ax-lb.db
      AX_LB_DATA_DIR: /var/lib/ax-lb
      DOCKER_HOST: unix:///var/run/docker.sock
      AX_LOG_LEVEL: INFO
      HOST_SYSFS_ROOT: /host/sys
      HOST_PROC_ROOT: /host/proc
      HOST_NET_NSENTER: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /sys:/host/sys:ro
      - /proc:/host/proc:ro
      - /var/lib/ax-lb:/var/lib/ax-lb
      - /run/ax-lb:/run/ax-lb
    networks:
      - control
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/system/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  gui:
    build: ./frontend
    container_name: ax-gui
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      # Bind control plane to management IP only (2A). Default 0.0.0.0 for first boot.
      # After promote-management, source /var/lib/ax-lb/mgmt-bind.env and recreate gui.
      - "${MGMT_BIND_IP:-0.0.0.0}:80:80"
    networks:
      - control

networks:
  control:
    driver: bridge
    name: ax-control
